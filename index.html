<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Login - Animated</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Shakllar konteyneri -->
  <div class="form-bg" id="bg-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>
  </div>

  <div class="container" id="login-container">
    <div class="glass-card">
      <h2>Welcome Back</h2>
      <form id="loginForm">
        <div class="input-box">
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Username" required>
        </div>
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" placeholder="Password" required>
        </div>
        <button type="submit">Log in</button>
      </form>
    </div>
  </div>

<script>
  const loginForm = document.getElementById('loginForm');
  const bgShapes = document.getElementById('bg-shapes');
  const container = document.getElementById('login-container');

  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    
    // 1. Animatsiyani boshlash
    bgShapes.classList.add('active');
    container.style.opacity = '0';
    container.style.transform = 'scale(0.8)';

    // 2. 2 soniyadan keyin formani tozalash va qaytarish
    setTimeout(() => {
      loginForm.reset(); // Malumotlarni o'chirish
      bgShapes.classList.remove('active'); // Shakllarni yoyish
      container.style.opacity = '1';
      container.style.transform = 'scale(1)';
    }, 2000); 
  });
</script>
</body>
</html>
